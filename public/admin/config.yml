# Decap CMS Configuration
# Per usare il CMS:
# 1. Deploy su Netlify
# 2. Abilita "Identity" e "Git Gateway" nelle impostazioni Netlify
# 3. Invita utenti via Netlify Identity

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: 'Upload "{{path}}"'
    deleteMedia: 'Delete "{{path}}"'

# Per sviluppo locale (sostituisci il backend sopra con questo):
# backend:
#   name: proxy
#   proxy_url: http://localhost:8081/api/v1

media_folder: public/images
public_path: /images
publish_mode: editorial_workflow

collections:
  - name: projects
    label: Progetti
    folder: src/data/projects
    create: true
    slug: '{{slug}}'
    fields:
      - { label: Titolo, name: title, widget: string }
      - { label: Descrizione Breve, name: description, widget: string }
      - { label: Contenuto, name: body, widget: markdown }
      - { label: Categoria, name: category, widget: select, options: [web, python, design] }
      - { label: Tag, name: tags, widget: list, default: [] }
      - { label: Link Progetto, name: link, widget: string, required: false, default: '' }
      - { label: Data, name: date, widget: datetime }

  - name: blog
    label: Blog
    folder: src/data/blog
    create: true
    slug: '{{slug}}'
    fields:
      - { label: Titolo, name: title, widget: string }
      - { label: Descrizione, name: description, widget: string }
      - { label: Contenuto, name: body, widget: markdown }
      - { label: Categoria, name: category, widget: select, options: [Web Design, Python, Design, Tecnologia] }
      - { label: Data, name: date, widget: datetime }
      - { label: Tempo di Lettura (minuti), name: readTime, widget: number, value_type: int, default: 5 }

  - name: testimonials
    label: Testimonianze
    folder: src/data/testimonials
    create: true
    slug: '{{slug}}'
    fields:
      - { label: Nome, name: name, widget: string }
      - { label: Ruolo, name: role, widget: string }
      - { label: Citazione, name: quote, widget: text }
      - { label: Data, name: date, widget: datetime }

  - name: settings
    label: Impostazioni Sito
    files:
      - name: general
        label: Impostazioni Generali
        file: src/data/settings.json
        fields:
          - { label: Nome Sito, name: siteName, widget: string }
          - { label: Descrizione, name: description, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: GitHub URL, name: github, widget: string }
          - { label: Instagram URL, name: instagram, widget: string }
          - { label: LinkedIn URL, name: linkedin, widget: string }
          - { label: Progetti Completati, name: projectsCount, widget: number, value_type: int }
          - { label: Anni di Esperienza, name: experienceYears, widget: number, value_type: int }
          - { label: Lingue Parlate, name: languagesCount, widget: number, value_type: int }
